    <script type="text/javascript">
      // Decode path from GitHub Pages 404 redirect
      (function (l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').reduce(function (q, s) {
            var pair = s.split('=');
            q[decodeURIComponent(pair[0])] = decodeURIComponent(pair.slice(1).join('=').replace(/~and~/g, '&'));
            return q;
          }, {});
          if (decoded.p !== undefined) {
            window.history.replaceState(
              null, null,
              l.pathname.replace(/\/$/, '') + (decoded.p ? '/' + decoded.p : '') +
              (decoded.q ? '?' + decoded.q : '') + l.hash
            );
          }
        }
      }(window.location));
    </script>
